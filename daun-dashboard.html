<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다운고 음료 주문 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #111; }

  .header { background: #1a7a4a; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 700; }
  .badge-live { background: #00e676; color: #003d1a; }
  .badge-off  { background: rgba(255,255,255,0.2); color: #fff; }

  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; }
  .stat { background: #f0faf4; border-radius: 10px; padding: 10px 12px; text-align: center; }
  .stat .lbl { font-size: 11px; color: #555; margin-bottom: 4px; }
  .stat .val { font-size: 22px; font-weight: 700; color: #1a7a4a; }
  .stat .sub { font-size: 11px; color: #888; margin-top: 2px; }

  .toolbar { display: flex; gap: 8px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; align-items: center; }
  .toolbar select, .toolbar button { font-size: 13px; height: 34px; padding: 0 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #333; cursor: pointer; font-family: inherit; }
  .toolbar button:hover { background: #f0faf4; border-color: #1a7a4a; color: #1a7a4a; }
  .btn-sound { background: #e8f5e9 !important; border-color: #1a7a4a !important; color: #1a7a4a !important; font-weight: 700; }
  .btn-sound.off { background: #f5f5f5 !important; border-color: #ccc !important; color: #888 !important; }
  .btn-done-all { background: #1a7a4a !important; color: #fff !important; border-color: #1a7a4a !important; font-weight: 700; }
  .btn-clear { background: #fff0f0 !important; border-color: #e53935 !important; color: #e53935 !important; font-weight: 700; }

  .drink-bar { padding: 8px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; gap: 6px; flex-wrap: wrap; min-height: 42px; align-items: center; }
  .chip { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid #c8e6c9; background: #f0faf4; display: flex; align-items: center; gap: 5px; }
  .chip .cnt { font-weight: 700; color: #1a7a4a; }
  .chip-none { font-size: 12px; color: #aaa; }

  .section-title { padding: 10px 16px 6px; font-size: 12px; font-weight: 700; color: #888; letter-spacing: 0.5px; }

  .order-list { padding: 0 12px 80px; }
  .order-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: opacity 0.2s; }
  .order-card.done { opacity: 0.4; }
  .order-card.done .order-name { text-decoration: line-through; color: #aaa; }
  .order-card.new-pulse { border-color: #1a7a4a; background: #f0faf4; animation: pulse 0.6s ease; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.01)} 100%{transform:scale(1)} }

  .order-num { font-size: 12px; font-weight: 700; color: #aaa; min-width: 28px; text-align: center; }
  .order-time { font-size: 11px; color: #888; min-width: 46px; text-align: center; }
  .order-icon { font-size: 26px; flex-shrink: 0; }
  .order-info { flex: 1; min-width: 0; }
  .order-name { font-size: 15px; font-weight: 700; }
  .order-meta { font-size: 12px; color: #888; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .order-price { font-size: 13px; font-weight: 700; color: #1a7a4a; margin-top: 2px; }
  .check-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #ccc; background: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-btn:hover { background: #e8f5e9; border-color: #1a7a4a; }
  .check-btn.checked { background: #1a7a4a; border-color: #1a7a4a; color: #fff; }

  .empty { text-align: center; padding: 48px 16px; color: #aaa; font-size: 14px; line-height: 2; }

  .delivery-tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; background: #e3f2fd; color: #1565c0; font-weight: 600; margin-right: 4px; }

  /* 배달 시간대 그룹 헤더 */
  .time-group-header { padding: 8px 12px; margin: 8px 12px 4px; background: #f8f8f8; border-radius: 8px; font-size: 12px; font-weight: 700; color: #555; display: flex; align-items: center; gap: 6px; }
  .time-group-header .tg-time { color: #1a7a4a; }
  .time-group-header .tg-cnt { background: #1a7a4a; color: #fff; border-radius: 99px; padding: 1px 8px; font-size: 11px; }
  .time-group-header .tg-pending { background: #ff9800; color: #fff; border-radius: 99px; padding: 1px 8px; font-size: 11px; }

  /* 날짜 탭 */
  .date-tab { display: flex; padding: 8px 16px; background: #fff; border-bottom: 1px solid #f0f0f0; gap: 6px; }
  .date-btn { font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; font-family: inherit; font-weight: 600; }
  .date-btn.active { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }
</style>
</head>
<body>

<div class="header">
  <h1>🥤 다운고 음료 주문 대시보드</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="date-label" class="badge badge-off"></span>
    <span id="conn-badge" class="badge badge-off">연결 중...</span>
  </div>
</div>

<div class="summary">
  <div class="stat"><div class="lbl">전체</div><div class="val" id="s-total">0</div><div class="sub">건</div></div>
  <div class="stat"><div class="lbl">대기</div><div class="val" id="s-pending" style="color:#e65100;">0</div><div class="sub">건</div></div>
  <div class="stat"><div class="lbl">완료</div><div class="val" id="s-done">0</div><div class="sub">건</div></div>
  <div class="stat"><div class="lbl">음료종류</div><div class="val" id="s-types">0</div><div class="sub">가지</div></div>
</div>

<div class="drink-bar" id="drink-bar">
  <span class="chip-none">주문 없음</span>
</div>

<div class="toolbar">
  <select id="filter-sel" onchange="applyFilter()">
    <option value="all">전체 보기</option>
    <option value="pending">대기 중만</option>
    <option value="done">완료만</option>
  </select>
  <select id="group-sel" onchange="renderOrders()">
    <option value="time">배달시간 순</option>
    <option value="order">접수시간 순</option>
  </select>
  <button class="btn-sound" id="sound-btn" onclick="toggleSound()">🔔 소리 켜짐</button>
  <button class="btn-done-all" onclick="markAllDone()">✅ 전체 완료</button>
  <button class="btn-clear" onclick="clearDone()">🗑 완료 정리</button>
</div>

<div class="date-tab" id="date-tab"></div>

<div id="section-title" class="section-title">주문 목록</div>
<div class="order-list" id="order-list">
  <div class="empty">🔄 Firebase 연결 중...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ─── Firebase 설정 ────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCEKr4-mG3_GsDR-hXRSM62j8dwGazmD6U",
  authDomain: "daun-drinks-cd57f.firebaseapp.com",
  projectId: "daun-drinks-cd57f",
  storageBucket: "daun-drinks-cd57f.firebasestorage.app",
  messagingSenderId: "654475550073",
  appId: "1:654475550073:web:b04955e6eeeb2b5abb23a8"
};

// ─── 상태 ────────────────────────────────────────────────────
let allOrders = [];
let checkedIds = new Set();
let hiddenIds  = new Set();
let soundEnabled = true;
let filterMode = 'all';
let prevOrderIds = new Set();
let audioCtx = null;
let selectedDate = getTodayStr();

// ─── 날짜 유틸 ───────────────────────────────────────────────
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtPrice(n) { return (n||0).toLocaleString('ko-KR') + '원'; }
function fmtTime(isoStr) {
  if (!isoStr) return '--:--';
  const d = new Date(isoStr);
  return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

// ─── 헤더 날짜 ───────────────────────────────────────────────
document.getElementById('date-label').textContent = getTodayStr();

// ─── 소리 ────────────────────────────────────────────────────
function playNewOrderSound() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundEnabled ? '🔔 소리 켜짐' : '🔕 소리 꺼짐';
  btn.className = soundEnabled ? 'btn-sound' : 'btn-sound off';
}

// ─── 필터/버튼 ───────────────────────────────────────────────
function applyFilter() {
  filterMode = document.getElementById('filter-sel').value;
  renderOrders();
}
function markAllDone() {
  getFilteredByDate().forEach(o => checkedIds.add(o.id));
  renderOrders();
}
function clearDone() {
  checkedIds.forEach(id => hiddenIds.add(id));
  checkedIds.clear();
  renderOrders();
}
function toggleCheck(id) {
  if (checkedIds.has(id)) checkedIds.delete(id);
  else checkedIds.add(id);
  renderOrders();
}

// ─── 날짜 필터 ───────────────────────────────────────────────
function getOrderDate(o) {
  if (o.deliveryDate) return o.deliveryDate;
  if (o.orderTime) return o.orderTime.slice(0, 10);
  return getTodayStr();
}

function getFilteredByDate() {
  return allOrders.filter(o => getOrderDate(o) === selectedDate);
}

function buildDateTabs() {
  const dates = new Set(allOrders.map(o => getOrderDate(o)));
  const sorted = [...dates].sort().reverse();
  const tab = document.getElementById('date-tab');
  if (sorted.length === 0) { tab.innerHTML = ''; return; }

  // 오늘 없으면 추가
  if (!dates.has(getTodayStr())) sorted.unshift(getTodayStr());

  tab.innerHTML = sorted.map(d => {
    const label = d === getTodayStr() ? `오늘 (${d})` : d;
    const cnt = allOrders.filter(o => getOrderDate(o) === d).length;
    return `<button class="date-btn ${d===selectedDate?'active':''}" onclick="selectDate('${d}')">${label} ${cnt>0?`<b style='color:${d===selectedDate?'#fff':'#1a7a4a'}'>·${cnt}</b>`:''}</button>`;
  }).join('');
}

function selectDate(d) {
  selectedDate = d;
  buildDateTabs();
  renderOrders();
}

// ─── 렌더링 ──────────────────────────────────────────────────
function renderOrders() {
  let orders = getFilteredByDate().filter(o => !hiddenIds.has(o.id));

  // 요약
  const total = orders.length;
  const done  = orders.filter(o => checkedIds.has(o.id)).length;
  const pending = total - done;
  const drinkMap = {};
  orders.forEach(o => {
    (o.items || []).forEach(item => {
      const k = item.name || '?';
      drinkMap[k] = (drinkMap[k] || 0) + (item.qty || 1);
    });
  });
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-done').textContent    = done;
  document.getElementById('s-types').textContent   = Object.keys(drinkMap).length;

  // 음료 칩
  const bar = document.getElementById('drink-bar');
  if (Object.keys(drinkMap).length === 0) {
    bar.innerHTML = '<span class="chip-none">주문 없음</span>';
  } else {
    bar.innerHTML = Object.entries(drinkMap)
      .sort((a,b) => b[1]-a[1])
      .map(([name,cnt]) => `<div class="chip"><span>${name}</span><span class="cnt">${cnt}잔</span></div>`)
      .join('');
  }

  // 필터 적용
  let filtered = orders.filter(o => {
    const isDone = checkedIds.has(o.id);
    if (filterMode === 'pending') return !isDone;
    if (filterMode === 'done')    return isDone;
    return true;
  });

  const groupMode = document.getElementById('group-sel').value;
  const list = document.getElementById('order-list');
  document.getElementById('section-title').textContent = `주문 목록 (${filtered.length}건)`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">📋<br>${filterMode==='pending'?'대기 중인 주문 없음':filterMode==='done'?'완료된 주문 없음':'주문 없음'}</div>`;
    return;
  }

  if (groupMode === 'time') {
    // 배달시간 순 그룹핑
    filtered.sort((a,b) => (a.deliveryTime||'99:99').localeCompare(b.deliveryTime||'99:99'));
    const groups = {};
    filtered.forEach(o => {
      const key = o.deliveryTime || '미정';
      if (!groups[key]) groups[key] = [];
      groups[key].push(o);
    });
    let html = '';
    Object.entries(groups).forEach(([time, grpOrders]) => {
      const pendingCnt = grpOrders.filter(o => !checkedIds.has(o.id)).length;
      html += `<div class="time-group-header">
        <span class="tg-time">📅 ${time}</span>
        <span class="tg-cnt">${grpOrders.length}건</span>
        ${pendingCnt > 0 ? `<span class="tg-pending">대기 ${pendingCnt}</span>` : '<span style="font-size:11px;color:#1a7a4a;">✅ 완료</span>'}
      </div>`;
      grpOrders.forEach((o, i) => { html += buildOrderCard(o, i+1); });
    });
    list.innerHTML = html;
  } else {
    // 접수시간 순
    filtered.sort((a,b) => new Date(a.orderTime||0) - new Date(b.orderTime||0));
    list.innerHTML = filtered.map((o,i) => buildOrderCard(o, i+1)).join('');
  }
}

function buildOrderCard(o, num) {
  const isDone = checkedIds.has(o.id);
  const icon = (o.items && o.items[0]) ? '🥤' : '🧋';
  const itemsSummary = (o.items || []).map(i => `${i.name}(${i.size||'M'})×${i.qty||1}`).join(', ');
  const meta = [o.location, itemsSummary].filter(Boolean).join(' · ');
  const orderTimeStr = fmtTime(o.orderTime);
  const delivLabel = o.deliveryLabel || o.deliveryDate || '';

  return `<div class="order-card${isDone?' done':''}" id="card-${o.id}">
    <div class="order-num">#${num}</div>
    <div class="order-time">${orderTimeStr}<br><span style="font-size:10px;color:#bbb;">접수</span></div>
    <div class="order-icon">${icon}</div>
    <div class="order-info">
      <div class="order-name">${o.name || '이름없음'}</div>
      <div class="order-meta">${meta || '정보 없음'}</div>
      <div class="order-meta">
        ${delivLabel ? `<span class="delivery-tag">${delivLabel}</span>` : ''}
        ${o.deliveryTime ? `<b style="color:#1a7a4a;">${o.deliveryTime}</b>` : ''}
        ${o.extraRequest ? ` · 📝 ${o.extraRequest}` : ''}
      </div>
      <div class="order-price">${fmtPrice(o.totalPrice)}</div>
    </div>
    <button class="check-btn${isDone?' checked':''}" onclick="toggleCheck('${o.id}')" title="${isDone?'완료 취소':'완료 처리'}">✓</button>
  </div>`;
}

// ─── Firebase 연결 ────────────────────────────────────────────
const badge = document.getElementById('conn-badge');

try {
  const app = firebase.initializeApp(firebaseConfig);
  const db  = firebase.firestore(app);

  badge.textContent = '연결 중...';

  db.collection('orders')
    .orderBy('orderTime', 'desc')
    .onSnapshot(snap => {
      badge.textContent   = '🟢 실시간 연결';
      badge.className     = 'badge badge-live';

      // 신규 주문 감지
      const newIds = new Set(snap.docs.map(d => d.id));
      let hasNew = false;
      snap.docs.forEach(d => { if (!prevOrderIds.has(d.id) && prevOrderIds.size > 0) hasNew = true; });
      if (hasNew) {
        playNewOrderSound();
        // 새 주문 카드 강조
        snap.docs.forEach(d => {
          if (!prevOrderIds.has(d.id)) {
            setTimeout(() => {
              const el = document.getElementById('card-' + d.id);
              if (el) { el.classList.add('new-pulse'); setTimeout(() => el.classList.remove('new-pulse'), 1000); }
            }, 300);
          }
        });
      }
      prevOrderIds = newIds;

      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      buildDateTabs();
      renderOrders();
    }, err => {
      badge.textContent = '❌ 오류: ' + err.code;
      badge.className   = 'badge badge-off';
      document.getElementById('order-list').innerHTML =
        `<div class="empty">❌ 오류: ${err.message}<br><small>Firestore 규칙 또는 인터넷 연결을 확인하세요</small></div>`;
    });

} catch(e) {
  badge.textContent = '❌ 초기화 실패';
  document.getElementById('order-list').innerHTML =
    `<div class="empty">❌ Firebase 초기화 오류<br><small>${e.message}</small></div>`;
}
</script>
</body>
</html>
